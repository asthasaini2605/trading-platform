<!DOCTYPE html>
<html>
<head>
  <title>Prediction Market Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: white;
      padding: 10px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .tab-btn {
      flex: 1;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .wallet-section {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .wallet-info {
      flex: 1;
      min-width: 200px;
    }

    .wallet-address {
      font-size: 0.9rem;
      color: #666;
      margin-top: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5rem;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      margin-bottom: 10px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outcome1 {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .btn-outcome2 {
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
    }

    .btn-claim {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .market-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-left: 4px solid #667eea;
    }

    .market-question {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .market-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin: 15px 0;
      font-size: 0.9rem;
      color: #666;
    }

    .odds-display {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }

    .odds-bar {
      flex: 1;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .odds-bar.outcome1 {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .odds-bar.outcome2 {
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
    }

    .status-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .status-active {
      background: #38ef7d;
      color: #1a1a2e;
    }

    .status-resolved {
      background: #ee0979;
      color: white;
    }

    .status-expired {
      background: #ffa502;
      color: white;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .stat-box {
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #666;
      margin-top: 5px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    #log {
      background: #1a1a2e;
      color: #0ff;
      padding: 20px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.6;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .market-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .market-actions button {
      margin-bottom: 0;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .profile-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <header>
    <h1>🎯 Prediction Market Platform</h1>
    <p>Decentralized betting on future outcomes</p>
  </header>

  <div class="wallet-section">
    <div class="wallet-info">
      <div id="walletStatus">Not Connected</div>
      <div class="wallet-address" id="walletAddress"></div>
    </div>
    <button onclick="connect()" style="width: auto;">🔗 Connect Wallet</button>
  </div>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('markets')">📊 Active Markets</button>
    <button class="tab-btn" onclick="showTab('profile')">👤 My Profile</button>
    <button class="tab-btn" onclick="showTab('create')">➕ Create Market</button>
    <button class="tab-btn" onclick="showTab('history')">📜 History</button>
  </div>

  <!-- Active Markets Tab -->
  <div id="marketsTab" class="tab-content active">
    <div id="activeMarketsList"></div>
  </div>

  <!-- Profile Tab -->
  <div id="profileTab" class="tab-content">
    <div class="grid">
      <div class="card">
        <h2>📊 Statistics</h2>
        <div class="profile-stats">
          <div class="stat-box">
            <div class="stat-value" id="totalBets">0</div>
            <div class="stat-label">Total Bets</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="totalWins">0</div>
            <div class="stat-label">Wins</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="totalEarnings">0 ETH</div>
            <div class="stat-label">Total Earnings</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="winRate">0%</div>
            <div class="stat-label">Win Rate</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>🎲 My Active Bets</h2>
        <div id="myActiveBets"></div>
      </div>
    </div>
  </div>

  <!-- Create Market Tab -->
  <div id="createTab" class="tab-content">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <h2>➕ Create New Market</h2>
      <input type="text" id="newQuestion" placeholder="Enter prediction question...">
      <input type="datetime-local" id="newDeadline">
      <button onclick="createNewMarket()">Create Market</button>
    </div>
  </div>

  <!-- History Tab -->
  <div id="historyTab" class="tab-content">
    <div class="card">
      <h2>📜 Resolved Markets</h2>
      <div id="resolvedMarketsList"></div>
    </div>
  </div>

  <div class="card">
    <h2>📝 Transaction Logs</h2>
    <div id="log"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script>

const contractAddress = "0x5FbDB2315678afecb367f032d93F642f64180aa3"; // Update this after deployment

let provider;
let signer;
let contract;
let userAddress;

const abi = [
  "function createMarket(string memory _question, uint _deadline) public returns (uint)",
  "function placePrediction(uint marketId, uint outcome) public payable",
  "function resolveMarket(uint marketId, uint winningOutcome) public",
  "function claimReward(uint marketId) public",
  "function getActiveMarkets() public view returns (uint[] memory)",
  "function getResolvedMarkets() public view returns (uint[] memory)",
  "function getMarket(uint marketId) public view returns (tuple(uint id, string question, uint deadline, uint totalPool, uint totalShares1, uint totalShares2, bool resolved, uint winningOutcome, address creator, uint createdAt))",
  "function getUserPrediction(uint marketId, address user) public view returns (tuple(uint marketId, uint outcome, uint shares, uint amountBet, bool claimed))",
  "function getUserProfile(address user) public view returns (tuple(uint totalBets, uint totalWins, uint totalEarnings, uint totalLosses))",
  "function getOdds(uint marketId) public view returns (uint odds1, uint odds2)",
  "function admin() public view returns (address)"
];

function log(msg){
  const timestamp = new Date().toLocaleTimeString();
  document.getElementById("log").innerHTML += `[${timestamp}] ${msg}<br>`;
  document.getElementById("log").scrollTop = document.getElementById("log").scrollHeight;
}

async function connect(){
  if (!window.ethereum){
    alert("Please install MetaMask to use this app");
    return;
  }

  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    contract = new ethers.Contract(contractAddress, abi, signer);

    userAddress = await signer.getAddress();
    document.getElementById("walletStatus").textContent = "Connected";
    document.getElementById("walletAddress").textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
    
    log(`✅ Wallet connected: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`);
    
    await refreshAll();
  } catch(e) {
    log("❌ Connection failed: " + e.message);
  }
}

function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  
  document.getElementById(tabName + 'Tab').classList.add('active');
  event.target.classList.add('active');
  
  refreshAll();
}

async function refreshAll() {
  if (!contract) return;
  
  await loadActiveMarkets();
  await loadProfile();
  await loadResolvedMarkets();
}

async function loadActiveMarkets() {
  try {
    const marketIds = await contract.getActiveMarkets();
    const container = document.getElementById("activeMarketsList");
    
    if (marketIds.length === 0) {
      container.innerHTML = '<div class="empty-state">No active markets yet. Create one!</div>';
      return;
    }
    
    container.innerHTML = '';
    
    for (let id of marketIds) {
      const market = await contract.getMarket(id);
      const odds = await contract.getOdds(id);
      const userPred = await contract.getUserPrediction(id, userAddress);
      
      const deadline = new Date(Number(market.deadline) * 1000);
      const isExpired = deadline < new Date();
      const isAdmin = (await contract.admin()).toLowerCase() === userAddress.toLowerCase();
      const isCreator = market.creator.toLowerCase() === userAddress.toLowerCase();
      
      const card = document.createElement('div');
      card.className = 'market-card';
      card.innerHTML = `
        <div class="market-question">${market.question}</div>
        <div class="market-info">
          <div>💰 Pool: ${ethers.formatEther(market.totalPool)} ETH</div>
          <div>⏰ Deadline: ${deadline.toLocaleString()}</div>
          <div>🎯 Market #${market.id}</div>
          <div>${isExpired ? '<span class="status-badge status-expired">EXPIRED</span>' : '<span class="status-badge status-active">ACTIVE</span>'}</div>
        </div>
        <div class="odds-display">
          <div class="odds-bar outcome1">${odds.odds1}%</div>
          <div class="odds-bar outcome2">${odds.odds2}%</div>
        </div>
        ${userPred.shares > 0n ? 
          `<div style="color: #667eea; font-weight: bold; margin: 10px 0;">
            ✅ You bet ${ethers.formatEther(userPred.amountBet)} ETH on Outcome ${userPred.outcome}
          </div>` : 
          `<div class="market-actions">
            <button class="btn-outcome1" onclick="placeBet(${market.id}, 1)" ${isExpired ? 'disabled' : ''}>
              Bet Outcome 1
            </button>
            <button class="btn-outcome2" onclick="placeBet(${market.id}, 2)" ${isExpired ? 'disabled' : ''}>
              Bet Outcome 2
            </button>
          </div>`
        }
        ${(isAdmin || isCreator) && !market.resolved ? 
          `<div class="market-actions">
            <button class="btn-claim" onclick="resolveMarketUI(${market.id}, 1)">Resolve: Outcome 1 Wins</button>
            <button class="btn-claim" onclick="resolveMarketUI(${market.id}, 2)">Resolve: Outcome 2 Wins</button>
          </div>` : ''
        }
      `;
      
      container.appendChild(card);
    }
  } catch(e) {
    log("❌ Error loading markets: " + e.message);
  }
}

async function loadProfile() {
  try {
    const profile = await contract.getUserProfile(userAddress);
    
    document.getElementById("totalBets").textContent = profile.totalBets.toString();
    document.getElementById("totalWins").textContent = profile.totalWins.toString();
    document.getElementById("totalEarnings").textContent = ethers.formatEther(profile.totalEarnings) + " ETH";
    
    const winRate = profile.totalBets > 0 ? 
      (Number(profile.totalWins) / Number(profile.totalBets) * 100).toFixed(1) : 0;
    document.getElementById("winRate").textContent = winRate + "%";
    
    // Load active bets
    const activeIds = await contract.getActiveMarkets();
    const myBetsContainer = document.getElementById("myActiveBets");
    myBetsContainer.innerHTML = '';
    
    let hasBets = false;
    for (let id of activeIds) {
      const pred = await contract.getUserPrediction(id, userAddress);
      if (pred.shares > 0n) {
        hasBets = true;
        const market = await contract.getMarket(id);
        
        const betCard = document.createElement('div');
        betCard.innerHTML = `
          <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
            <strong>${market.question}</strong><br>
            Outcome: ${pred.outcome} | Amount: ${ethers.formatEther(pred.amountBet)} ETH
          </div>
        `;
        myBetsContainer.appendChild(betCard);
      }
    }
    
    if (!hasBets) {
      myBetsContainer.innerHTML = '<div class="empty-state">No active bets</div>';
    }
    
  } catch(e) {
    log("❌ Error loading profile: " + e.message);
  }
}

async function loadResolvedMarkets() {
  try {
    const marketIds = await contract.getResolvedMarkets();
    const container = document.getElementById("resolvedMarketsList");
    
    if (marketIds.length === 0) {
      container.innerHTML = '<div class="empty-state">No resolved markets yet</div>';
      return;
    }
    
    container.innerHTML = '';
    
    for (let id of marketIds) {
      const market = await contract.getMarket(id);
      const userPred = await contract.getUserPrediction(id, userAddress);
      
      const card = document.createElement('div');
      card.className = 'market-card';
      card.innerHTML = `
        <div class="market-question">${market.question}</div>
        <div class="market-info">
          <div>💰 Pool: ${ethers.formatEther(market.totalPool)} ETH</div>
          <div>🏆 Winner: Outcome ${market.winningOutcome}</div>
          <div><span class="status-badge status-resolved">RESOLVED</span></div>
        </div>
        ${userPred.shares > 0n ? `
          <div style="margin: 10px 0;">
            Your bet: ${ethers.formatEther(userPred.amountBet)} ETH on Outcome ${userPred.outcome}
            ${userPred.outcome === market.winningOutcome ? 
              (userPred.claimed ? 
                '<div style="color: green;">✅ Reward Claimed</div>' : 
                '<button class="btn-claim" onclick="claimRewardUI(' + market.id + ')">💰 Claim Reward</button>') :
              '<div style="color: red;">❌ Lost</div>'
            }
          </div>
        ` : ''}
      `;
      
      container.appendChild(card);
    }
  } catch(e) {
    log("❌ Error loading history: " + e.message);
  }
}

async function createNewMarket() {
  const question = document.getElementById("newQuestion").value;
  const deadlineInput = document.getElementById("newDeadline").value;
  
  if (!question || !deadlineInput) {
    alert("Please fill all fields");
    return;
  }
  
  const deadline = Math.floor(new Date(deadlineInput).getTime() / 1000);
  
  try {
    log("⏳ Creating new market...");
    const tx = await contract.createMarket(question, deadline);
    await tx.wait();
    log("✅ Market created successfully!");
    
    document.getElementById("newQuestion").value = '';
    document.getElementById("newDeadline").value = '';
    
    showTab('markets');
    refreshAll();
  } catch(e) {
    log("❌ Error: " + (e.reason || e.message));
  }
}

async function placeBet(marketId, outcome) {
  const amount = prompt("Enter amount in ETH:", "0.01");
  if (!amount) return;
  
  try {
    log(`⏳ Placing bet on Market #${marketId}, Outcome ${outcome}...`);
    const tx = await contract.placePrediction(marketId, outcome, {
      value: ethers.parseEther(amount)
    });
    await tx.wait();
    log(`✅ Bet placed successfully!`);
    refreshAll();
  } catch(e) {
    log("❌ Error: " + (e.reason || e.message));
  }
}

async function resolveMarketUI(marketId, outcome) {
  if (!confirm(`Resolve market #${marketId} with Outcome ${outcome} as winner?`)) return;
  
  try {
    log(`⏳ Resolving market #${marketId}...`);
    const tx = await contract.resolveMarket(marketId, outcome);
    await tx.wait();
    log("✅ Market resolved!");
    refreshAll();
  } catch(e) {
    log("❌ Error: " + (e.reason || e.message));
  }
}

async function claimRewardUI(marketId) {
  try {
    log(`⏳ Claiming reward from market #${marketId}...`);
    const tx = await contract.claimReward(marketId);
    await tx.wait();
    log("✅ Reward claimed successfully!");
    refreshAll();
  } catch(e) {
    log("❌ Error: " + (e.reason || e.message));
  }
}

</script>

</body>
</html>
